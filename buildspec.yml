version: 0.2
 
env:
  variables:
    AWS_DEFAULT_REGION: ap-south-1
    IMAGE_REPO_NAME: demo1
    IMAGE_TAG: latest
    ACCOUNT_ID: 860945038990
    ACCOUNT_URI: 860945038990.dkr.ecr.ap-south-1.amazonaws.com
    ECS_CLUSTER: Java_application_01
    ECS_SERVICE: Java_code-service-apu75gyi
 
phases:
 
  pre_build:
    commands:
      - echo "Logging into Amazon ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ACCOUNT_URI
  build:
    commands:
      - echo "Build started on $(date)"
      - echo "Building the Java application..."
      - mvn clean install
 
      - echo "Building Docker image..."
      - docker build -t $IMAGE_REPO_NAME:$IMAGE_TAG .
 
      - docker tag $IMAGE_REPO_NAME:$IMAGE_TAG $ACCOUNT_URI/$IMAGE_REPO_NAME:$IMAGE_TAG
 
  post_build:
    commands:
      - echo "Pushing Docker image to ECR..."
      - docker push $ACCOUNT_URI/$IMAGE_REPO_NAME:$IMAGE_TAG
 
      - echo "Build completed on $(date)"
      - echo "Writing image definitions file..."
      - printf '[{"name":"java-container","imageUri":"%s"}]' $ACCOUNT_URI/$IMAGE_REPO_NAME:$IMAGE_TAG > imagedefinitions.json
      - echo "Triggering ECS deployment..."
      - aws ecs update-service -cluster $ECS_CLUSTER --service $ECS_SERVICE --force-new-deployment
      - echo "Deployment completed on $(date)"
 
artifacts:
  files:
    - imagedefinitions.json
   
